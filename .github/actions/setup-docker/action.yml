name: Setup Docker
description: Setup Buildx and login to GHCR

inputs:
  registry:
    required: true
  username:
    required: true
  password:
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

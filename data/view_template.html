<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="{{ channel_name }}/{{ post_id }}"
  data-width="100%" data-userpic="false" data-color="343638" data-dark-color="FFFFFF"></script>
<script>
if (window.parent !== window) {
  function postHeight() {
    window.parent.postMessage({ type: 'viewResize', height: document.body.scrollHeight + 2 }, '*');
  }
  postHeight();
  new ResizeObserver(postHeight).observe(document.body);
  window.addEventListener('load', postHeight);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        div {
            width: 500px;
            max-width: 500px;
        }
    </style>
    <title>Telegram Digest</title>
</head>

<body>
    <div>
        <h1>Made with <a href="https://github.com/mrfeod/tgdigest">https://github.com/mrfeod/tgdigest</a></h1>
        {% for block in blocks %}
        <h2>{{ block.header }} <img src="{{ block.icon }}" height="16" />
        </h2>
        {% for card in block.cards %}
        <h3>{{ loop.index }}. <img src="{{ block.icon }}" height="16" />
            {{ card.count | format_number }}</h3>
        <div>
            <iframe src="/view/{{ channel_name }}/{{ card.id }}?iframe=true" style="width:100%;border:none;max-height:900px;" loading="lazy" scrolling="no"></iframe>
        </div>
        {% endfor %}
        {% endfor %}
        {% if editor_choice_id > 0 %}
        <h2>Editor's choice</h2>
        <iframe src="/view/{{ channel_name }}/{{ editor_choice_id }}?iframe=true" style="width:100%;border:none;max-height:900px;" loading="lazy" scrolling="no"></iframe>
        {% endif %}
    </div>
    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'viewResize') {
                var iframes = document.querySelectorAll('iframe');
                for (var i = 0; i < iframes.length; i++) {
                    if (iframes[i].contentWindow === e.source) {
                        iframes[i].style.height = e.data.height + 'px';
                        break;
                    }
                }
            }
        });
        {% if is_loading %}
        (function(){
            function poll() {
                fetch('/progress/' + encodeURIComponent('{{ task_id }}'))
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.done) {
                            var u = new URL(window.location.href);
                            u.searchParams.delete('force');
                            u.searchParams.delete('force_limit');
                            window.location.href = u.toString();
                        } else { setTimeout(poll, 1000); }
                    })
                    .catch(function() { setTimeout(poll, 2000); });
            }
            poll();
        })();
        {% endif %}
    </script>
</body>

</html>

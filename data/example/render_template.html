<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        div {
            width: 500px;
            max-width: 500px;
        }
    </style>
    <title>Rendering page</title>
</head>

<body>
    {% for card in cards %}
    <div>
        <table>
            <thead>
                <tr>
                    <th><img src="pic.png" height="24" onerror="this.style.display='none'" /></th>
                    <th>
                        <h2>{{ card.header }} <img src="{{ card.icon }}" height="24" /> {{
                            card.count | format_number }}</h2>
                    </th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <iframe src="/view/{{ channel_name }}/{{ card.id }}?iframe=true" style="width:100%;border:none;max-height:900px;" loading="lazy" scrolling="no"></iframe>
        <h5>Made with <a href="https://github.com/mrfeod/tgdigest">https://github.com/mrfeod/tgdigest</a></h5>
    </div>
    {% endfor %}
    {% if editor_choice_id > 0 %}
    <div>
        <table>
            <thead>
                <tr>
                    <th><img src="pic.png" height="24" onerror="this.style.display='none'" /></th>
                    <th>
                        <h2>Editor's choice</h2>
                    </th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <iframe src="/view/{{ channel_name }}/{{ editor_choice_id }}?iframe=true" style="width:100%;border:none;max-height:900px;" loading="lazy" scrolling="no"></iframe>
        <h5>Made with <a href="https://github.com/mrfeod/tgdigest">https://github.com/mrfeod/tgdigest</a></h5>
    </div>
    {% endif %}
    <script>
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'viewResize') {
                var iframes = document.querySelectorAll('iframe');
                for (var i = 0; i < iframes.length; i++) {
                    if (iframes[i].contentWindow === e.source) {
                        iframes[i].style.height = e.data.height + 'px';
                        break;
                    }
                }
            }
        });
    </script>
</body>

</html>
